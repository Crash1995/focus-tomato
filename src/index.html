<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusForge</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="titlebar">
        <div class="window-controls">
          <button class="traffic traffic-close" id="closeWindow" aria-label="Закрыть"></button>
          <button class="traffic traffic-minimize" id="minimizeWindow" aria-label="Свернуть"></button>
          <span class="traffic traffic-disabled"></span>
        </div>
        <strong>FocusForge</strong>
        <button class="icon-button" id="settingsButton" aria-label="Настройки">⚙</button>
      </header>

      <main class="columns">
        <section class="timer-column">
          <div class="timer-ring">
            <svg viewBox="0 0 220 220" aria-hidden="true">
              <circle class="ring-bg" cx="110" cy="110" r="96"></circle>
              <circle class="ring-progress" id="timerProgress" cx="110" cy="110" r="96"></circle>
            </svg>
            <div class="timer-time" id="timerTime">25:00</div>
          </div>
          <div class="mode-label">
            <span class="mode-dot" id="modeDot"></span>
            <span id="modeText">Работа</span>
          </div>
          <div class="timer-actions">
            <button class="primary-button" id="startPauseButton">Старт</button>
            <button class="secondary-button" id="resetButton">Сброс</button>
          </div>
        </section>

        <section class="tasks-column" id="centerPanel">
          <div class="tasks-tabs" id="tasksTabs">
            <button class="tasks-tab is-active" data-tab="open" id="tabOpen">Задачи <span id="tabOpenCount">0/0</span></button>
            <button class="tasks-tab" data-tab="done" id="tabDone">Сделано · <span id="tabDoneCount">0</span></button>
          </div>

          <div class="tasks-view" id="tasksOpenView">
            <div class="tasks-empty hidden" id="tasksEmpty">
              <h1>Запланируй день</h1>
              <p class="subtitle">Каждая строка — задача. Маркеры <code>-</code> / <code>[ ]</code> срежутся автоматом.</p>
              <textarea id="tasksBulkInput" aria-label="Список задач на день" placeholder="- [ ] Веб3: скилл — описание&#10;- [ ] Вайбкод: помидоро — задачник&#10;…"></textarea>
              <button class="primary-button" id="tasksBulkSubmit">Запланировать</button>
            </div>
            <div class="tasks-list" id="tasksList"></div>
            <div class="tasks-inline-row hidden" id="tasksInlineRow">
              <input id="tasksInlineInput" aria-label="Новая задача" maxlength="200" placeholder="+ Новая задача (Enter)">
            </div>
          </div>

          <div class="tasks-view hidden" id="tasksDoneView">
            <div class="tasks-list" id="tasksDoneList"></div>
          </div>
        </section>

        <aside class="stats-column">
          <div class="level-block">
            <div class="level-number" id="levelNumber">Lvl 1</div>
            <div class="level-name" id="levelName">Новичок</div>
          </div>
          <div class="xp-progress">
            <div class="bar">
              <div class="bar-fill" id="xpBarFill"></div>
            </div>
            <p id="xpProgressText">0 / 100 XP до Lvl 2</p>
          </div>
          <p id="streakText">🔥 0 дней</p>
          <p id="todaySessionsText">Сессий: 0</p>
          <p id="totalXPText">Всего XP: 0</p>
          <button class="secondary-button" id="openHistoryButton">История</button>
        </aside>
      </main>
    </div>

    <div class="modal-root hidden" id="pomodoroDoneModal">
      <div class="modal">
        <h2 id="pomodoroDoneTitle">🍅 Помидор готов</h2>
        <div class="modal-actions">
          <button class="secondary-button" id="pomodoroAgainButton">Ещё 🍅</button>
          <button class="primary-button" id="pomodoroBreakButton">Break</button>
        </div>
      </div>
    </div>

    <div class="modal-root hidden" id="apiKeyModal">
      <div class="modal modal-wide">
        <h2>Для AI-отчёта нужен ключ OpenRouter</h2>
        <button class="link-button" id="openRouterLink">Получить бесплатно → openrouter.ai/keys</button>
        <input id="apiKeyInput" type="password" placeholder="sk-or-...">
        <div class="modal-actions">
          <button class="secondary-button" id="cancelApiKeyButton">Отмена</button>
          <button class="primary-button" id="saveApiKeyButton">Сохранить</button>
        </div>
      </div>
    </div>

    <div class="modal-root hidden" id="settingsModal">
      <div class="modal modal-wide">
        <h2>Настройки</h2>
        <label>Длительность работы</label>
        <div class="segmented" id="workDurationOptions"></div>
        <label>Длительность отдыха</label>
        <div class="segmented" id="breakDurationOptions"></div>
        <label>API ключ</label>
        <div class="key-row">
          <input id="settingsApiKey" type="password" placeholder="sk-or-...">
          <button class="secondary-button" id="toggleKeyButton">Показать</button>
        </div>
        <div class="modal-actions">
          <button class="secondary-button" id="deleteKeyButton">Удалить ключ</button>
          <button class="secondary-button" id="cancelSettingsButton">Отмена</button>
          <button class="primary-button" id="saveSettingsButton">Сохранить</button>
        </div>
      </div>
    </div>

    <div class="history-overlay hidden" id="historyOverlay">
      <div class="history-header">
        <h2>История</h2>
        <button class="icon-button" id="historyCloseButton" aria-label="Закрыть">✕</button>
      </div>
      <div class="history-body" id="historyBody"></div>
    </div>

    <div class="level-up hidden" id="levelUpOverlay">
      <canvas id="confettiCanvas"></canvas>
      <div id="levelUpText">Level Up!</div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <script src="./vendor/html2canvas.min.js"></script>
    <script src="./vendor/confetti.browser.js"></script>
    <script src="./renderer/tasks.js"></script>
    <script src="./renderer/history.js"></script>
    <script src="./core/gamification.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
