name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npx electron-builder --mac dir

      - name: Archive app
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent dist/mac*/FocusForge.app "FocusForge-${APP_VERSION}-mac.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FocusForge-*-mac.zip
          generate_release_notes: true
